name: Rust MLS Uniffi CD Pipeline

on:
  push:
    branches: [master]
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  pull-requests: write

jobs:
  build-android:
    name: Build Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: armv7-linux-androideabi, aarch64-linux-android, x86_64-linux-android, i686-linux-android

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-android-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-android-

      - name: Build Android
        working-directory: crates/kchat-mls-uniffi
        run: bash ../../scripts/mls_uniffi_build_android.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: android/
          retention-days: 30
          if-no-files-found: error

  build-ios:
    name: Build iOS
    runs-on: macos-latest
    env:
      IPHONEOS_DEPLOYMENT_TARGET: "15.0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios, aarch64-apple-ios-sim, x86_64-apple-ios

      - name: Install cargo-swift
        run: cargo install cargo-swift

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-ios-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-ios-

      - name: Build iOS
        working-directory: crates/kchat-mls-uniffi
        run: cargo swift package -y -p ios --release -n ios

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: crates/kchat-mls-uniffi/ios/
          retention-days: 30
          if-no-files-found: error
