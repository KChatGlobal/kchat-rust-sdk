name: Rust MLS Uniffi CD Pipeline

on:
  push:
    branches: [master]
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  pull-requests: write

jobs:
  prepare-release:
    name: Prepare release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: k8s
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Extract version
        id: version
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"

  build-android:
    name: Build and publish Android
    if: startsWith(github.ref, 'refs/tags/v')
    needs: prepare-release
    uses: KChatGlobal/jenkins-shared-library/.github/workflows/sdk-android-cd.yml@develop
    permissions:
      id-token: write
      contents: write
      pull-requests: write
    with:
      commit_id: ${{ github.sha }}
      runner_label: "k8s"
      android_ndk_version: "r26d"
      kotlin_bindgen_bin_folder: "uniffi-bindgen"
      project: "kchat-mls-uniffi"
      rust_tool_chain: "stable"
      rust_tool_chain_target: aarch64-linux-android, x86_64-linux-android
      android_abi: '["arm64-v8a", "x86_64"]'
      android_studio_template_repo: "KChatGlobal/sdk-android-template"
      package_name: "com.kchat.mls"
      repository_key: "sdk-uq-local"
      artifact_id: "kchat-mls-uniffi"
      artifact_version: ${{ needs.prepare-release.outputs.version }}

  build-ios:
    name: Build and sync Apple
    if: false
    needs: prepare-release
    uses: KChatGlobal/jenkins-shared-library/.github/workflows/sdk-apple-cd.yml@develop
    permissions:
      id-token: write
      contents: write
      pull-requests: write
    with:
      commit_id: ${{ github.sha }}
      runner_label: "macos-latest"
      project: "kchat-mls-uniffi"
      package_name: "ios"
      platform: "ios"
      target_repo: "KChatGlobal/<kchat-mls-apple-sdk-repo>"
      target_branch: "develop"
      version_tag: ${{ github.ref_name }}
      version_title: "KChat MLS Apple SDK ${{ github.ref_name }}"
      auto_approve: true
